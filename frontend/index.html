<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Background Remover</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .upload-zone {
      border: 3px dashed #ddd;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .upload-zone.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
    }

    .upload-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .upload-text {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 10px;
    }

    .upload-hint {
      font-size: 0.9rem;
      color: #999;
    }

    #fileInput {
      display: none;
    }

    .preview-section {
      display: none;
      margin-top: 30px;
    }

    .preview-section.active {
      display: block;
    }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .preview-row {
        grid-template-columns: 1fr;
      }
    }

    .preview-box {
      text-align: center;
    }

    .preview-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }

    .preview-image {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      background: repeating-conic-gradient(#ccc 0% 25%, white 0% 50%) 50% / 20px 20px;
    }

    .preview-image.result {
      background: repeating-conic-gradient(#ccc 0% 25%, white 0% 50%) 50% / 20px 20px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f0f0f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 1.1rem;
    }

    .error {
      display: none;
      background: #fee;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      color: #c00;
    }

    .error.active {
      display: block;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }

    footer a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ Photo Background Remover</h1>
      <p class="subtitle">上传图片，5秒去除背景</p>
    </header>

    <div class="card">
      <!-- 上传区域 -->
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">📤</div>
        <div class="upload-text">拖拽图片到这里，或点击选择</div>
        <div class="upload-hint">支持 JPG、PNG、WebP，最大 10MB</div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      </div>

      <!-- 加载状态 -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">正在去除背景...</div>
      </div>

      <!-- 错误提示 -->
      <div class="error" id="error"></div>

      <!-- 预览区域 -->
      <div class="preview-section" id="previewSection">
        <div class="preview-row">
          <div class="preview-box">
            <div class="preview-label">原图</div>
            <img class="preview-image" id="originalPreview" alt="Original">
          </div>
          <div class="preview-box">
            <div class="preview-label">去除背景后</div>
            <img class="preview-image result" id="resultPreview" alt="Result">
          </div>
        </div>
        <div style="text-align: center;">
          <button class="btn btn-primary" id="downloadBtn">下载 PNG</button>
          <button class="btn btn-secondary" id="resetBtn">继续处理</button>
        </div>
      </div>
    </div>

    <footer>
      <p>图片处理后立即释放，不存储任何数据</p>
    </footer>
  </div>

  <script>
    const API_ENDPOINT = '/api/removebg';

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const previewSection = document.getElementById('previewSection');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    let currentResultBlob = null;

    // 上传区域点击
    uploadZone.addEventListener('click', () => {
      if (!uploadZone.classList.contains('disabled')) {
        fileInput.click();
      }
    });

    // 拖拽
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // 处理文件
    async function handleFile(file) {
      // 校验格式
      const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        showError('不支持的文件格式，请上传 JPG、PNG 或 WebP 图片');
        return;
      }

      // 校验大小
      if (file.size > 10 * 1024 * 1024) {
        showError('文件过大，最大支持 10MB');
        return;
      }

      // 显示原图预览
      const originalUrl = URL.createObjectURL(file);
      originalPreview.src = originalUrl;

      // 开始处理
      uploadZone.classList.add('disabled');
      hideError();
      previewSection.classList.remove('active');
      loading.classList.add('active');

      try {
        const formData = new FormData();
        formData.set('image_file', file);

        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || errData.details || '处理失败，请重试');
        }

        currentResultBlob = await response.blob();
        const resultUrl = URL.createObjectURL(currentResultBlob);
        resultPreview.src = resultUrl;

        loading.classList.remove('active');
        previewSection.classList.add('active');

      } catch (err) {
        loading.classList.remove('active');
        showError(err.message || '网络错误，请检查连接后重试');
      } finally {
        uploadZone.classList.remove('disabled');
      }
    }

    // 下载
    downloadBtn.addEventListener('click', () => {
      if (!currentResultBlob) return;

      const url = URL.createObjectURL(currentResultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'removed-background.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // 重置
    resetBtn.addEventListener('click', () => {
      previewSection.classList.remove('active');
      fileInput.value = '';
      currentResultBlob = null;
    });

    // 错误提示
    function showError(msg) {
      error.textContent = msg;
      error.classList.add('active');
    }

    function hideError() {
      error.classList.remove('active');
    }
  </script>
</body>
</html>
