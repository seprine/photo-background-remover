<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪄 图片背景去除</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: #f8f9fa;
      color: #333;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #888;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .upload-zone {
      border: 2px dashed #e0e0e0;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-zone:hover, .upload-zone.dragging {
      border-color: #667eea;
      background: #f7f8ff;
    }

    .upload-zone .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-zone p {
      font-size: 15px;
      color: #555;
      margin-bottom: 4px;
    }

    .upload-zone .hint {
      font-size: 12px;
      color: #aaa;
    }

    #fileInput { display: none; }

    .preview-section {
      display: none;
      margin-top: 24px;
    }

    .preview-section.active { display: block; }

    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .preview-box {
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
    }

    .preview-label {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 8px;
      background: #fafafa;
    }

    .preview-box img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      display: block;
      background: repeating-conic-gradient(#e0e0e0 0% 25%, #f5f5f5 0% 50%) 0 0 / 16px 16px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-secondary {
      background: #f1f1f1;
      color: #555;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 32px;
    }

    .loading.active { display: block; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: #888;
    }

    .error-msg {
      display: none;
      background: #fff0f0;
      color: #e53e3e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
    }

    .error-msg.active { display: block; }

    .tips {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 32px;
    }

    .tips span {
      font-size: 12px;
      color: #aaa;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: #ccc;
    }

    .footer a { color: #aaa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🪄 图片背景去除</h1>
      <p>5秒完成 · 无需注册 · 保护隐私</p>
    </div>

    <div class="card">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📤</div>
        <p>拖拽图片到这里，或点击选择文件</p>
        <p class="hint">支持 JPG · PNG · WebP，不超过 10MB</p>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">正在识别主体...</div>
      </div>

      <div class="preview-section" id="previewSection">
        <div class="preview-row">
          <div class="preview-box">
            <div class="preview-label">原图</div>
            <img id="originalPreview" alt="原图">
          </div>
          <div class="preview-box">
            <div class="preview-label">去除背景后</div>
            <img id="resultPreview" alt="结果">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="downloadBtn">⬇️ 下载 PNG</button>
          <button class="btn btn-secondary" id="resetBtn">🔄 继续处理</button>
        </div>
      </div>
    </div>

    <div class="tips">
      <span>⚡ 5秒完成</span>
      <span>🔒 不留痕迹</span>
      <span>🆓 完全免费</span>
    </div>

    <div class="footer">
      Powered by <a href="#">Remove.bg</a> · 图片仅在服务器内存中流转，不做任何持久化存储
    </div>
  </div>

  <script>
    // 注意：API_ENDPOINT 需要改成你的 Worker 实际地址
    // 如果部署在 Cloudflare Pages 同一项目下，可留 '/api/removebg'
    // 否则填 Worker 的完整 URL，如 'https://your-worker.workers.dev/api/removebg'
    const API_ENDPOINT = '/api/removebg';

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const previewSection = document.getElementById('previewSection');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const loadingText = document.getElementById('loadingText');

    const messages = ['正在识别主体...', '正在去除背景...', '正在生成透明图...', '快好了...'];
    let loadingInterval = null;
    let currentResultUrl = null;

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragging');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragging');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
      if (!validTypes.includes(file.type)) {
        showError('仅支持 JPG / PNG / WebP 格式');
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showError('图片大小不能超过 10MB');
        return;
      }
      processImage(file);
    }

    function showError(msg) {
      errorMsg.textContent = '⚠️ ' + msg;
      errorMsg.classList.add('active');
    }

    function hideError() {
      errorMsg.classList.remove('active');
    }

    async function processImage(file) {
      hideError();
      uploadZone.style.display = 'none';
      loading.classList.add('active');
      resultPreview.src = '';
      originalPreview.src = URL.createObjectURL(file);

      let idx = 0;
      loadingInterval = setInterval(() => {
        loadingText.textContent = messages[idx % messages.length];
        idx++;
      }, 1500);

      try {
        const formData = new FormData();
        formData.set('image_file', file);

        const res = await fetch(API_ENDPOINT, {
          method: 'POST',
          body: formData,
        });

        clearInterval(loadingInterval);
        loading.classList.remove('active');

        if (!res.ok) {
          throw new Error('处理失败，请稍后重试');
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        currentResultUrl = url;
        resultPreview.src = url;
        previewSection.classList.add('active');

      } catch (e) {
        clearInterval(loadingInterval);
        loading.classList.remove('active');
        showError(e.message || '未知错误');
        uploadZone.style.display = 'block';
      }
    }

    downloadBtn.addEventListener('click', () => {
      if (!currentResultUrl) return;
      const a = document.createElement('a');
      a.href = currentResultUrl;
      a.download = 'removed-bg.png';
      a.click();
    });

    resetBtn.addEventListener('click', () => {
      previewSection.classList.remove('active');
      uploadZone.style.display = 'block';
      loading.classList.remove('active');
      fileInput.value = '';
      currentResultUrl = null;
      originalPreview.src = '';
      resultPreview.src = '';
      hideError();
    });
  </script>
</body>
</html>
